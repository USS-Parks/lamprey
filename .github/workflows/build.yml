name: Build Lamprey

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_REBUILD_FORCE_GIT: '1'

      - name: Type check (main)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Type check (renderer)
        run: npx tsc --noEmit -p tsconfig.web.json

      - name: Build NSIS installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Headless smoke of main bundle
        # Loads out/main/index.js under a stub-electron Node process. Catches
        # bundler-specific failures (TDZ from hoisted side-effect imports,
        # missing pack registrations) that vitest cannot observe.
        run: npm run smoke:bundle

      - name: Integrity smoke of renderer bundle
        # Verifies out/renderer/index.html + every referenced asset was emitted
        # and non-empty, and the entry chunk mounts a React root. Catches the
        # "white screen" class of broken renderer build.
        run: npm run smoke:renderer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: lamprey-windows
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.exe
          draft: true

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install OS deps for AppImage + safeStorage
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libxss1 libnss3 libasound2t64 fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Type check (main)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Type check (renderer)
        run: npx tsc --noEmit -p tsconfig.web.json

      - name: Build AppImage
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Headless smoke of main bundle
        # Loads out/main/index.js under a stub-electron Node process. Catches
        # bundler-specific failures (TDZ from hoisted side-effect imports,
        # missing pack registrations) that vitest cannot observe.
        run: npm run smoke:bundle

      - name: Integrity smoke of renderer bundle
        # Verifies out/renderer/index.html + every referenced asset was emitted
        # and non-empty, and the entry chunk mounts a React root. Catches the
        # "white screen" class of broken renderer build.
        run: npm run smoke:renderer

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v6
        with:
          name: lamprey-linux
          path: dist/*.AppImage
          if-no-files-found: error
          retention-days: 14

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.AppImage
          draft: true

  # macOS builds require an Apple Developer signing identity to notarize.
  # Run locally with `npm run build:mac` after setting:
  #   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID, CSC_LINK, CSC_KEY_PASSWORD
  # See https://www.electron.build/code-signing for the full setup.
  #
  # CI runs an UNSIGNED smoke job on every push/tag so macOS regressions
  # (Windows-only APIs, path separators, native module ABI) are caught
  # without holding the CI on the signing identity. Full installer
  # packaging (`electron-builder --mac`) is deliberately not invoked —
  # the build + smokes prove the bundle is sound; signing is a release-
  # runner concern.
  build-macos:
    runs-on: macos-latest
    env:
      # Tell electron-builder not to hunt for a signing identity that
      # isn't there. The smoke jobs below don't run electron-builder, but
      # this protects any future step that does.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (main)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Type check (renderer)
        run: npx tsc --noEmit -p tsconfig.web.json

      - name: Build main + renderer bundles
        # electron-vite build produces out/main + out/renderer. Skipping
        # electron-builder --mac because we have no signing identity in
        # CI — the build smoke catches the regression class we care
        # about (Windows-only APIs, path separators, native ABI) without
        # needing a packaged .app/.dmg.
        run: npm run build

      - name: Headless smoke of main bundle
        run: npm run smoke:bundle

      - name: Integrity smoke of renderer bundle
        run: npm run smoke:renderer
