name: Build Lamprey

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_REBUILD_FORCE_GIT: '1'

      - name: Type check (main)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Type check (renderer)
        run: npx tsc --noEmit -p tsconfig.web.json

      - name: Build NSIS installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Headless smoke of main bundle
        # Loads out/main/index.js under a stub-electron Node process. Catches
        # bundler-specific failures (TDZ from hoisted side-effect imports,
        # missing pack registrations) that vitest cannot observe.
        run: npm run smoke:bundle

      - name: Integrity smoke of renderer bundle
        # Verifies out/renderer/index.html + every referenced asset was emitted
        # and non-empty, and the entry chunk mounts a React root. Catches the
        # "white screen" class of broken renderer build.
        run: npm run smoke:renderer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: lamprey-windows
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.exe
          draft: true

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install OS deps for AppImage + safeStorage
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libxss1 libnss3 libasound2t64 fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Type check (main)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Type check (renderer)
        run: npx tsc --noEmit -p tsconfig.web.json

      - name: Build AppImage
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Headless smoke of main bundle
        # Loads out/main/index.js under a stub-electron Node process. Catches
        # bundler-specific failures (TDZ from hoisted side-effect imports,
        # missing pack registrations) that vitest cannot observe.
        run: npm run smoke:bundle

      - name: Integrity smoke of renderer bundle
        # Verifies out/renderer/index.html + every referenced asset was emitted
        # and non-empty, and the entry chunk mounts a React root. Catches the
        # "white screen" class of broken renderer build.
        run: npm run smoke:renderer

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v6
        with:
          name: lamprey-linux
          path: dist/*.AppImage
          if-no-files-found: error
          retention-days: 14

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.AppImage
          draft: true

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      # No Apple Developer signing identity in CI — build unsigned.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (main)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Type check (renderer)
        run: npx tsc --noEmit -p tsconfig.web.json

      - name: Build DMG
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Headless smoke of main bundle
        run: npm run smoke:bundle

      - name: Integrity smoke of renderer bundle
        run: npm run smoke:renderer

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: lamprey-macos
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.dmg
          draft: true
