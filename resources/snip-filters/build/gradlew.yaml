name: gradlew
description: Compress gradle wrapper output
match:
  command: gradlew
pipeline:
  - action: strip_ansi
  - action: keep_lines
    pattern: '(BUILD SUCCESSFUL|BUILD FAILED|error|warning|Task |FAILURE|deprecated)'
  - action: head
    n: 80
  - action: on_empty
    message: 'gradlew: ok'
