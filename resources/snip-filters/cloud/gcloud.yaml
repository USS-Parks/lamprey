name: gcloud
description: Compress gcloud command output
match:
  command: gcloud
pipeline:
  - action: strip_ansi
  - action: keep_lines
    pattern: '(Created|Updated|Deleted|Listed|NAME|STATUS|ERROR|WARNING|projectNumber|operation)'
  - action: head
    n: 80
  - action: on_empty
    message: 'gcloud: no output'
