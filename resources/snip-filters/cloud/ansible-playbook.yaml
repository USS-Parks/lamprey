name: ansible-playbook
description: Compress ansible-playbook output to PLAY + summary lines
match:
  command: ansible-playbook
pipeline:
  - action: strip_ansi
  - action: keep_lines
    pattern: '(PLAY|TASK|ok:|changed:|failed:|fatal:|FAILED|PLAY RECAP|skipping)'
  - action: head
    n: 100
  - action: on_empty
    message: 'ansible-playbook: no output'
