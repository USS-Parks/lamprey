name: cargo-check
description: Compress cargo check output
match:
  command: cargo
  subcommand: check
pipeline:
  - action: strip_ansi
  - action: keep_lines
    pattern: '(Checking|Finished|warning:|error\[|error:|Some errors)'
  - action: head
    n: 80
  - action: on_empty
    message: 'cargo check: ok'
