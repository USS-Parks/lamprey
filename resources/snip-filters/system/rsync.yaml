name: rsync
description: Compress rsync output to summary + transferred files
match:
  command: rsync
pipeline:
  - action: strip_ansi
  - action: keep_lines
    pattern: '(sent .* bytes|received .* bytes|total size|speedup|^[a-zA-Z<>])'
  - action: head
    n: 80
  - action: on_empty
    message: 'rsync: ok'
