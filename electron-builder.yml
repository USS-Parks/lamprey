appId: com.lamprey.harness
productName: Lamprey
copyright: Copyright © 2026 Lamprey Contributors

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json
  # Production deps (openai, @modelcontextprotocol/sdk, better-sqlite3, chokidar,
  # gray-matter, pdf-parse, @babel/standalone) are externalized by
  # electron-vite's externalizeDepsPlugin and require()d at runtime, so
  # node_modules must NOT be excluded. electron-builder smart-includes
  # only the production dependencies declared in package.json.

asarUnpack:
  - "**/*.node"

extraResources:
  - from: resources/vendor
    to: vendor
  - from: resources/skills
    to: skills
  - from: resources/icon.png
    to: icon.png
  - from: resources/splash.png
    to: splash.png

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.png
  target:
    - dmg
  hardenedRuntime: true

win:
  icon: resources/icon.png
  target:
    - nsis
  artifactName: ${productName}-${version}-${arch}.${ext}
  # Skip the sign-and-edit step entirely. We aren't code-signing, and the
  # winCodeSign archive contains macOS symlinks that Windows can't extract
  # without Developer Mode / admin (A required privilege is not held by the client).
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Lamprey
  # No custom sidebar/header — NSIS expects 164x314 BMP for sidebar and
  # 150x57 for header. Until we ship pixel-correct bitmaps the default
  # NSIS modern UI renders sharper than a downscaled wide-aspect image.

linux:
  icon: resources/icon.png
  category: Development
  target:
    - AppImage
  artifactName: ${productName}-${version}-${arch}.${ext}

publish:
  provider: github
  owner: USS-Parks
  repo: lamprey
